version: '3.9'

services:
  asar-postgres:
    image: postgres:17-alpine
    container_name: asar_postgres_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: asar_admin
      POSTGRES_PASSWORD: asar_password_2026
      POSTGRES_DB: asar_db
    ports:
      - '6098:5432' # Updated port to avoid 6096/6097
    volumes:
      - asar_postgres_data:/var/lib/postgresql/data
    networks:
      - asar_network

  asar-minio:
    image: minio/minio:latest
    container_name: asar_minio_container
    restart: unless-stopped
    ports:
      - '9030:9000' # API Port
      - '9031:9001' # Console Port
    environment:
      MINIO_ROOT_USER: asar_minio_user
      MINIO_ROOT_PASSWORD: asar_minio_password
    volumes:
      - asar_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - asar_network

  asar-redis:
    image: redis:7.2-alpine
    container_name: asar_redis_container
    restart: unless-stopped
    ports:
      - '6381:6379' # Updated port to avoid 6379/6380
    volumes:
      - asar_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - asar_network

networks:
  asar_network:
    driver: bridge

volumes:
  asar_postgres_data:
    driver: local
  asar_minio_data:
    driver: local
  asar_redis_data:
    driver: local
